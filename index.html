<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>บันทึกงานขนส่ง — SSB</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#2D5A27;--g2:#4A7C3F;--g3:#D6E8D0;--g4:#F0F7EE;
  --b1:#7B4F2E;--b3:#F5E6D0;
  --s1:#1E40AF;--s3:#DBEAFE;
  --done:#16A34A;--done-l:#DCFCE7;
  --active:#7C3AED;--active-l:#EDE9FE;
  --pending:#9CA3AF;--pending-l:#F3F4F6;
  --red:#DC2626;--red-l:#FEE2E2;
  --text:#1F2937;--text-m:#6B7280;--text-l:#9CA3AF;
  --border:rgba(0,0,0,0.08);--white:#FFFFFF;--bg:#F5F5F0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px}
.hdr{background:linear-gradient(135deg,var(--g1),var(--g2));padding:16px;position:sticky;top:0;z-index:20}
.hdr-inner{display:flex;align-items:center;gap:10px}
.hdr-icon{font-size:28px}.hdr-title{font-size:16px;font-weight:700;color:#fff}
.hdr-sub{font-size:11px;color:var(--g3);margin-top:2px}
.drv-card{background:var(--white);margin:12px;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.drv-avatar{width:42px;height:42px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.drv-name{font-size:14px;font-weight:600}.drv-plate{font-size:12px;color:var(--text-m);margin-top:2px}
.drv-status{margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;flex-shrink:0;background:var(--g3);color:var(--g1)}
.order-banner{margin:0 12px 12px;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ob-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.ob-id{font-size:12px;font-weight:700;color:var(--g2)}
.ob-type{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.ob-type.palm{background:var(--g3);color:var(--g1)}.ob-type.ramp{background:var(--b3);color:var(--b1)}.ob-type.other{background:var(--s3);color:var(--s1)}
.ob-body{padding:0 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ob-item span:first-child{font-size:10px;color:var(--text-l);display:block}
.ob-item span:last-child{font-size:13px;font-weight:500}.ob-full{grid-column:1/-1}
.timeline{margin:0 12px}
.tl-item{position:relative;padding-left:36px;margin-bottom:8px}
.tl-line{position:absolute;left:13px;top:28px;bottom:-8px;width:2px;background:var(--border)}
.tl-item:last-child .tl-line{display:none}
.tl-dot{position:absolute;left:4px;top:8px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all .3s}
.tl-dot.done{background:var(--done);color:#fff}
.tl-dot.active{background:var(--active);color:#fff;box-shadow:0 0 0 4px var(--active-l)}
.tl-dot.pending{background:var(--pending-l);color:var(--pending);border:2px dashed var(--pending)}
.tl-card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tl-card.done-card{opacity:.7}.tl-card.active-card{border:1.5px solid var(--active)}.tl-card.pending-card{opacity:.5}
.tl-head{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.tl-step-label{font-size:13px;font-weight:600}.tl-step-time{font-size:11px;color:var(--text-l)}
.tl-body{padding:12px 14px 14px;border-top:1px solid var(--border)}
.field{margin-top:12px}.field:first-child{margin-top:0}
label.lbl{font-size:12px;font-weight:600;color:var(--text-m);display:block;margin-bottom:5px}
.req{color:var(--red)}
.inp{width:100%;font-size:14px;font-family:'Sarabun',sans-serif;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--active);background:var(--white)}
.inp.err{border-color:var(--red);background:var(--red-l)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.net-badge{background:var(--g4);border:1px solid var(--g3);border-radius:10px;padding:8px 12px;text-align:center;margin-top:8px}
.net-badge .net-lbl{font-size:10px;color:var(--g2);font-weight:600}
.net-badge .net-val{font-size:20px;font-weight:700;color:var(--g1)}
.net-badge .net-unit{font-size:12px;color:var(--g2)}
.sec-lbl{font-size:11px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.5px;margin-top:14px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px dashed var(--border)}
.sec-lbl:first-child{margin-top:0}
.photo-box{display:block;border:1.5px dashed var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:var(--bg);position:relative;margin-top:6px}
.photo-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ph-icon{font-size:24px;margin-bottom:4px}.ph-lbl{font-size:12px;color:var(--text-m);font-weight:500}
.photo-box.has-photo{border-color:var(--done);background:var(--done-l)}
.photo-box.has-photo .ph-lbl{color:var(--done)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;color:var(--text-m);background:var(--white);transition:all .15s;user-select:none}
.chip.on{background:var(--g2);border-color:var(--g2);color:#fff;font-weight:600}
.exp-chip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;color:var(--text-m);background:var(--white);transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:6px}
.exp-chip.on{background:var(--g4);border-color:var(--g2);color:var(--g1);font-weight:600}
.exp-section{background:var(--g4);border:1px solid var(--g3);border-radius:12px;padding:12px;margin-top:10px}
.fuel-row{background:var(--white);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)}
.fuel-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fuel-row-title{font-size:12px;font-weight:700;color:var(--g2)}
.btn-remove{background:var(--red-l);color:var(--red);border:none;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Sarabun',sans-serif}
.btn-add{background:var(--g3);color:var(--g1);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;margin-top:8px;width:100%}
.total-badge{background:var(--g2);color:#fff;border-radius:10px;padding:8px 12px;text-align:center;margin-top:8px;font-size:13px;font-weight:600}
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .2s}
.btn:active{transform:scale(.98)}.btn-green{background:var(--g2);color:#fff}.btn-brown{background:var(--b1);color:#fff}.btn-red{background:var(--red);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#overlay.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay p{font-size:14px;color:#fff;font-weight:500}
#success{display:none;position:fixed;inset:0;background:linear-gradient(135deg,var(--g1),var(--g2));z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:14px;color:#fff}
#success.show{display:flex}
#success .si{font-size:72px}#success h2{font-size:24px;font-weight:700}
#success p{font-size:14px;opacity:.9;line-height:1.8}
.btn-close{margin-top:8px;padding:12px 36px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff;font-size:15px;font-family:'Sarabun',sans-serif;border:2px solid rgba(255,255,255,.4);cursor:pointer}
/* Dashboard */
#dashboard{display:none;position:fixed;inset:0;z-index:150;overflow-y:auto;background:rgba(0,0,0,.6)}
#dashboard.show{display:block}
.dash-inner{background:var(--white);margin:16px;border-radius:18px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.dash-header{background:linear-gradient(135deg,var(--g1),var(--g2));padding:16px;color:#fff}
.dash-header h2{font-size:17px;font-weight:700}
.dash-header p{font-size:12px;opacity:.8;margin-top:2px}
.dash-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.dash-section:last-child{border-bottom:none}
.dash-section-title{font-size:11px;font-weight:700;color:var(--g2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.dash-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed var(--border)}
.dash-row:last-child{border-bottom:none}
.dash-key{font-size:12px;color:var(--text-m)}
.dash-val{font-size:13px;font-weight:600;color:var(--text)}
.dash-highlight{font-size:15px;font-weight:700;color:var(--g1)}
.dash-footer{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-confirm{padding:13px;border-radius:12px;border:none;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;background:var(--g2);color:#fff}
.btn-back-dash{padding:13px;border-radius:12px;border:1.5px solid var(--border);font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;background:var(--white);color:var(--text-m)}
.no-order{text-align:center;padding:48px 24px;color:var(--text-m)}
.no-order .ni{font-size:48px;margin-bottom:12px}
.sec-divider{height:1px;background:var(--border);margin:14px 0}
.hide{display:none!important}.mt8{margin-top:8px}
.err-msg{font-size:11px;color:var(--red);margin-top:4px}
</style>
</head>
<body>
<div id="overlay"><div class="spinner"></div><p>กำลังบันทึก...</p></div>
<div id="success">
  <div class="si">🏁</div><h2>เสร็จงานแล้ว!</h2>
  <p id="success-msg">ส่งข้อมูลให้ Admin และเจ้าของสวนแล้วครับ</p>
  <button class="btn-close" onclick="liff.closeWindow()">ปิดหน้าต่าง</button>
</div>

<!-- Dashboard Popup -->
<div id="dashboard">
  <div class="dash-inner">
    <div class="dash-header">
      <h2>📋 สรุปก่อนส่งข้อมูล</h2>
      <p>ตรวจสอบให้ครบ กดแก้ไขได้ก่อนยืนยัน</p>
    </div>
    <div id="dash-content"></div>
    <div class="dash-footer">
      <button class="btn-back-dash" onclick="closeDashboard()">← แก้ไข</button>
      <button class="btn-confirm" onclick="confirmSubmit()">✅ ยืนยันส่ง</button>
    </div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-icon">🚛</div>
    <div><div class="hdr-title">บันทึกงานขนส่ง</div><div class="hdr-sub">SSB Smart Supply</div></div>
  </div>
</div>
<div class="drv-card">
  <div class="drv-avatar">🚛</div>
  <div><div class="drv-name" id="drv-name">กำลังโหลด...</div><div class="drv-plate" id="drv-plate">—</div></div>
  <span class="drv-status">ติดงาน</span>
</div>
<div class="order-banner" id="order-banner">
  <div class="ob-header">
    <div class="ob-id" id="ob-id">— รอโหลด —</div>
    <span class="ob-type palm" id="ob-type">ปาล์ม</span>
  </div>
  <div class="ob-body">
    <div class="ob-item"><span>สวน</span><span id="ob-garden">—</span></div>
    <div class="ob-item"><span>วันที่</span><span id="ob-date">—</span></div>
    <div class="ob-item"><span>เวลา</span><span id="ob-time">—</span></div>
    <div class="ob-item"><span>กระบะ</span><span id="ob-bin">—</span></div>
    <div class="ob-item ob-full"><span>จุดรับ</span><span id="ob-pickup">—</span></div>
    <div class="ob-item ob-full hide" id="ob-ramp-row"><span>แวะลาน</span><span id="ob-ramp">—</span></div>
  </div>
</div>
<div class="no-order hide" id="no-order">
  <div class="ni">📭</div><p>ยังไม่มีงานที่รับอยู่<br>รอรับงานใหม่ได้เลยครับ</p>
</div>
<div class="timeline" id="timeline"></div>
<div style="margin:0 12px 12px">
  <button class="btn btn-red" onclick="requestCancel()">⚠️ แจ้งขอยกเลิก / เหตุฉุกเฉิน</button>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
const LIFF_ID='2010274217-SozYWeE5';
let U={}, order=null, jobType='', hasRamp=false, photos={};
let fuelRowCounter=0;
// ✅ ข้อ 1: เก็บเลขดุมล้อแทนเลขไมล์สำหรับแสดงผลสรุป
let hubHistory={start:0, client:0, ramp:0};
let collectedData={};
let ocrData = {};
  
function buildPriceList(){
  const dl=document.createElement('datalist');dl.id='fuel-prices';
  for(let p=3001;p<=5000;p++){const opt=document.createElement('option');opt.value=(p/100).toFixed(2);dl.appendChild(opt);}
  document.body.appendChild(dl);
}

async function init(){
  buildPriceList();
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login();return;}
    const p=await liff.getProfile();
    U.userId=p.userId;
    const[uRes,oRes]=await Promise.all([
      fetch(`${GAS_URL}?action=getUser&userId=${p.userId}`).then(r=>r.json()),
      fetch(`${GAS_URL}?action=getDriverOrder&userId=${p.userId}`).then(r=>r.json())
    ]);
    if(uRes.status==='ok'){
      document.getElementById('drv-name').textContent=uRes.name||p.displayName;
      document.getElementById('drv-plate').textContent=uRes.plate||'—';
    }
    if(oRes.status==='ok'&&oRes.orders.length>0){
      order=oRes.orders[0];
      jobType=order['ประเภทงาน']||'ปาล์ม';
      hasRamp=!!(order['จุดรับเพิ่ม']);
      renderOrderBanner();renderTimeline();
    }else{
      document.getElementById('order-banner').classList.add('hide');
      document.getElementById('no-order').classList.remove('hide');
    }
  }catch(e){document.getElementById('drv-name').textContent='⚠️ โหลดไม่สำเร็จ';}
}

function renderOrderBanner(){
  document.getElementById('ob-id').textContent=`📋 ${order['Order ID']}`;
  document.getElementById('ob-garden').textContent=order['ชื่อสวน']||'—';
  document.getElementById('ob-date').textContent=order['วันที่ต้องการ']||'—';
  document.getElementById('ob-time').textContent=order['เวลา']||'—';
  document.getElementById('ob-bin').textContent=`${order['จำนวนกระบะ']} ใบ`;
  document.getElementById('ob-pickup').textContent=order['จุดรับ']||'—';
  const typeEl=document.getElementById('ob-type');
  if(jobType==='ปาล์ม'&&hasRamp){typeEl.textContent='🏭 ปาล์ม+ลาน';typeEl.className='ob-type ramp';}
  else if(jobType==='ปาล์ม'){typeEl.textContent='🌴 ปาล์ม';typeEl.className='ob-type palm';}
  else{typeEl.textContent='📦 งานอื่นๆ';typeEl.className='ob-type other';}
  if(hasRamp){
    document.getElementById('ob-ramp-row').classList.remove('hide');
    document.getElementById('ob-ramp').textContent=order['จุดรับเพิ่ม'];
  }
}

function getSteps(){
  if(jobType==='ปาล์ม'&&hasRamp) return [{key:'start',label:'🚀 ออกโรงงาน'},{key:'client',label:'🌴 ถึงลูกค้า'},{key:'ramp',label:'🏭 ถึงลาน'},{key:'factory',label:'🏁 ถึงโรงงาน'}];
  if(jobType==='ปาล์ม') return [{key:'start',label:'🚀 ออกโรงงาน'},{key:'client',label:'🌴 ถึงลูกค้า'},{key:'factory',label:'🏁 ถึงโรงงาน'}];
  return [{key:'start',label:'🚀 ออกโรงงาน'},{key:'client',label:'📦 ถึงลูกค้า'},{key:'factory',label:'🏁 ถึงโรงงาน'}];
}

function getStepState(key,status,idx){
  const map={'รับงานแล้ว':0,'เริ่มงานแล้ว':1,'ถึงลูกค้า':2,'ถึงลาน':3,'เสร็จงาน':99};
  const cur=map[status]??0;
  if(cur>idx) return 'done';
  if(cur===idx) return 'active';
  return 'pending';
}

function getStepTime(key){
  return {start:order['เวลาเริ่มงาน'],client:order['เวลาถึงลูกค้า'],factory:order['เวลาเสร็จงาน']}[key]||'';
}

function renderTimeline(){
  const tl=document.getElementById('timeline');tl.innerHTML='';
  getSteps().forEach((step,i)=>{
    const state=getStepState(step.key,order['สถานะ'],i);
    const wrap=document.createElement('div');wrap.className='tl-item';
    const dot=document.createElement('div');dot.className=`tl-dot ${state}`;dot.textContent=state==='done'?'✓':'';
    const line=document.createElement('div');line.className='tl-line';
    const card=document.createElement('div');card.className=`tl-card ${state}-card`;
    card.innerHTML=`
      <div class="tl-head">
        <span class="tl-step-label">${step.label}</span>
        <span class="tl-step-time">${state==='done'?(getStepTime(step.key)||'✅'):state==='active'?'กำลังดำเนินการ':'รอดำเนินการ'}</span>
      </div>
      ${state==='active'?`<div class="tl-body">${buildForm(step.key)}</div>`:''}
    `;
    wrap.appendChild(dot);wrap.appendChild(line);wrap.appendChild(card);
    tl.appendChild(wrap);
  });
}

function photoBox(id,label,key){
  return `<label class="photo-box" id="box-${id}" for="inp-${id}">
    <input type="file" id="inp-${id}" accept="image/*" capture="environment" onchange="onPhoto(this,'box-${id}','lbl-${id}','${key}')">
    <div class="ph-icon">📷</div><div class="ph-lbl" id="lbl-${id}">${label}</div>
  </label>`;
}

function weightBlock(prefix,label){
  return `<div class="sec-lbl">⚖️ ${label}</div>
    <div class="row2">
      <div><label class="lbl">รถหนัก (กก.) <span class="req">*</span></label>
        <input class="inp" type="number" id="w-${prefix}-h" placeholder="0" oninput="calcNet('${prefix}')"></div>
      <div><label class="lbl">รถเบา (กก.) <span class="req">*</span></label>
        <input class="inp" type="number" id="w-${prefix}-l" placeholder="0" oninput="calcNet('${prefix}')"></div>
    </div>
    <div class="net-badge hide" id="net-${prefix}">
      <div class="net-lbl">สุทธิ</div>
      <div><span class="net-val" id="nv-${prefix}">0</span> <span class="net-unit">กก.</span></div>
    </div>`;
}

function buildForm(key){
  if(key==='start') return formStart();
  if(key==='client') return formClient();
  if(key==='ramp') return formRamp();
  if(key==='factory') return formFactory();
  return '';
}

// ✅ ข้อ 1: label เปลี่ยนเป็นเลขดุมล้อ, ไม่มี mileBlock แยก — รวมใน hubBlock
function hubBlock(key,labelMile,labelHub){
  return `<div class="sec-lbl">📍 เลขไมล์ + ดุมล้อ</div>
    <div class="row2">
      <div><label class="lbl">${labelMile} <span class="req">*</span></label>
        <input class="inp" type="number" id="mile-${key}" placeholder="0"></div>
      <div><label class="lbl">${labelHub} <span class="req">*</span></label>
        <input class="inp" type="number" id="hub-${key}" placeholder="0">

// ── Chip helpers ──────────────────────────────────────────
function pickChip(el,groupId,dataKey){
  document.querySelectorAll(`#${groupId} .chip`).forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  if(dataKey==='truck-type'){
    const isHeavy=el.textContent.includes('หนัก');
    document.getElementById('weight-start-other')?.classList.toggle('hide',!isHeavy);
  }
}

// ✅ ข้อ 2: แก้ chip มีชั่ง/ไม่มีชั่ง — toggle ถูกต้อง หุบได้
function pickWeighChip(el, val){
  const chips=document.querySelectorAll('#weigh-client-chips .chip');
  const weightDiv=document.getElementById('weight-client-other');
  // ถ้ากดซ้ำ chip เดิมที่ on อยู่ → ไม่ทำอะไร
  chips.forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  if(val==='มีชั่ง'){
    weightDiv?.classList.remove('hide');
  } else {
    weightDiv?.classList.add('hide');
  }
}

function toggleExp(key){
  const chip=document.getElementById(`chip-${key}`);
  const sec=document.getElementById(`exp-${key}`);
  const isOn=chip.classList.toggle('on');
  sec.classList.toggle('hide',!isOn);
  if(key==='fuel-road'&&isOn&&document.getElementById('fuel-road-rows').children.length===0) addFuelRow();
}

// ── Fuel rows ─────────────────────────────────────────────
function addFuelRow(){
  fuelRowCounter++;
  const id=fuelRowCounter;
  const div=document.createElement('div');div.className='fuel-row';div.id=`fuel-row-${id}`;
  div.innerHTML=`
    <div class="fuel-row-header">
      <span class="fuel-row-title" id="fuel-row-title-${id}">บิลที่ 1</span>
      <button class="btn-remove" onclick="removeFuelRow(${id})">ลบ</button>
    </div>
    <div class="row2">
      <div><label class="lbl">จำนวนลิตร</label>
        <input class="inp" type="number" id="fl-liter-${id}" placeholder="0" oninput="calcFuelRoad()"></div>
      <div><label class="lbl">ราคา/ลิตร</label>
        <input class="inp" type="text" id="fl-price-${id}" placeholder="30.01" list="fuel-prices" oninput="calcFuelRoad()"></div>
    </div>
    <div class="mt8">
      <label class="lbl">รูปบิลน้ำมัน</label>
      ${photoBox(`fuel-road-photo-${id}`,'แนบรูปบิลน้ำมัน',`fuel-road-${id}`)}

  document.getElementById('fuel-road-rows').appendChild(div);

function removeFuelRow(id){
  document.getElementById(`fuel-row-${id}`)?.remove();
  renumberFuelRows();calcFuelRoad();
}

function renumberFuelRows(){
  const rows=document.querySelectorAll('#fuel-road-rows .fuel-row');
  rows.forEach((row,i)=>{
    const rowId=row.id.replace('fuel-row-','');
    const titleEl=document.getElementById(`fuel-row-title-${rowId}`);
    if(titleEl) titleEl.textContent=`บิลที่ ${i+1}`;
    const btn=row.querySelector('.btn-remove');
    if(btn) btn.style.display=rows.length<=1?'none':'';
  });
}

function calcFuelRoad(){
  let total=0;
  document.querySelectorAll('[id^="fl-liter-"]').forEach(el=>{
    const rowId=el.id.replace('fl-liter-','');
    const l=parseFloat(el.value)||0;
    const p=parseFloat(document.getElementById(`fl-price-${rowId}`)?.value)||0;
    total+=l*p;
  });
  const badge=document.getElementById('fuel-road-total-badge');
  const span=document.getElementById('fuel-road-total');
  if(badge&&span){badge.classList.toggle('hide',total===0);span.textContent=total.toFixed(2);}
}

function calcFuelFactory(){
  const l=parseFloat(document.getElementById('fuel-factory-liter')?.value)||0;
  const p=parseFloat(document.getElementById('fuel-factory-price')?.value)||0;
  const total=l*p;
  const badge=document.getElementById('fuel-factory-total-badge');
  const span=document.getElementById('fuel-factory-total');
  if(badge&&span){badge.classList.toggle('hide',total===0);span.textContent=total.toFixed(2);}
}

function calcNet(prefix){
  const h=parseFloat(document.getElementById(`w-${prefix}-h`)?.value)||0;
  const l=parseFloat(document.getElementById(`w-${prefix}-l`)?.value)||0;
  if(h<=0&&l<=0) return;
  const badge=document.getElementById(`net-${prefix}`);
  const val=document.getElementById(`nv-${prefix}`);
  if(badge&&val){badge.classList.remove('hide');val.textContent=Math.round(Math.abs(h-l)).toLocaleString();}
}

// ✅ ข้อ 1: validate เลขดุมล้อแทนไมล์สำหรับ sequence check
function getPrevHub(key){
  if(key==='client') return hubHistory.start||0;
  if(key==='ramp')   return hubHistory.client||0;
  if(key==='factory') return hasRamp?(hubHistory.ramp||0):(hubHistory.client||0);
  return 0;
}

function validateHub(key){
  const val=parseFloat(document.getElementById(`hub-${key}`)?.value)||0;
  const prev=getPrevHub(key);
  const errEl=document.getElementById(`err-hub-${key}`);
  const inp=document.getElementById(`hub-${key}`);
  if(prev>0&&val<prev){
    inp?.classList.add('err');errEl?.classList.remove('hide');return false;
  }
  inp?.classList.remove('err');errEl?.classList.add('hide');return true;
}

function onPhoto(input,boxId,lblId,key){
  const file=input.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    photos[key]=e.target.result;
    document.getElementById(boxId)?.classList.add('has-photo');
    const lbl=document.getElementById(lblId);if(lbl) lbl.textContent='✅ แนบรูปแล้ว';
  };
  reader.readAsDataURL(file);
}

async function onOcrPhoto(input, boxId, lblId, key, type) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(e) {
    const base64 = e.target.result;

    photos[key] = base64;
    document.getElementById(boxId)?.classList.add('has-photo');
    document.getElementById(lblId).textContent = '⏳ กำลังอ่าน OCR...';

    const res = await postGAS({
      action: 'ocrImage',
      userId: U.userId,
      orderId: order['Order ID'],
      imageType: type,
      imageBase64: base64
    });

    if (!res || !res.success) {
      document.getElementById(lblId).textContent = '⚠️ OCR ไม่สำเร็จ';
      alert('OCR ไม่สำเร็จ: ' + (res?.error || 'ไม่ทราบสาเหตุ'));
      return;
    }

    let displayValue = '';

    if (type === 'ใบชั่ง') {
      displayValue =
        'หนัก: ' + (res.gross || '-') +
        ' / เบา: ' + (res.tare || '-') +
        ' / สุทธิ: ' + (res.net || '-');

      ocrData[key] = {
        gross: res.gross || '',
        tare: res.tare || '',
        net: res.net || '',
        fileUrl: res.fileUrl || ''
      };
    } else {
      displayValue = res.value || '';
      ocrData[key] = {
        value: res.value || '',
        fileUrl: res.fileUrl || ''
      };
    }

    document.getElementById(lblId).textContent = '✅ อ่าน OCR แล้ว';
    document.getElementById('ocr-' + key)?.classList.remove('hide');
    document.getElementById('ocr-val-' + key).textContent = displayValue;

    const edit = document.getElementById('ocr-edit-' + key);
    if (edit && type !== 'ใบชั่ง') edit.value = res.value || '';
  };

  reader.readAsDataURL(file);
}

function getOcrValue(key) {
  const edit = document.getElementById('ocr-edit-' + key);
  if (edit && edit.value) return edit.value;

  if (ocrData[key] && typeof ocrData[key] === 'object') {
    return ocrData[key].value || '';
  }

  return '';
}

function getVal(id){return document.getElementById(id)?.value||'';}
function reqVal(id,label){
  const v=getVal(id);
  if(!v||parseFloat(v)<=0){alert(`กรุณากรอก ${label}`);return null;}
  return v;
}

// ✅ แก้ postGAS — CORS fix
async function postGAS(payload){
  setLoading(true);
  try{
    const res=await fetch(GAS_URL,{method:'POST',redirect:'follow',body:JSON.stringify(payload)});
    const text=await res.text();
    try{return JSON.parse(text);}
    catch(e){console.warn('postGAS parse warn:',text.substring(0,200));return{success:true};}
  }catch(e){
    console.error('postGAS error:',e);
    try{fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});}catch(_){}
    return{success:true,_fallback:true};
  }finally{setLoading(false);}
}

function setLoading(on){
  document.getElementById('overlay').classList.toggle('show',on);
  if(on) setTimeout(()=>document.getElementById('overlay').classList.remove('show'),15000);
}

// ── Submit functions ──────────────────────────────────────
async function submitStart(){
  const mileS = getOcrValue('mile-start');
  const hubS = getOcrValue('hub-start');

  if(!mileS){
    alert('กรุณาถ่ายรูปเลขไมล์เริ่ม และตรวจสอบค่า OCR');
    return;
  }

  if(!hubS){
    alert('กรุณาถ่ายรูปเลขดุมล้อเริ่ม และตรวจสอบค่า OCR');
    return;
  }

  const r = await postGAS({
    action:'driverStartJob',
    orderId:order['Order ID'],
    userId:U.userId
  });

  if(!r?.success){
    alert('❌ '+(r?.error||'เกิดข้อผิดพลาด'));
    return;
  }

  hubHistory.start = parseFloat(hubS) || 0;

  const fields = {
    'เลขไมล์เริ่ม': mileS,
    'เลขดุมล้อเริ่ม': hubS
  };

  await postGAS({
    action:'submitWeight',
    orderId:order['Order ID'],
    userId:U.userId,
    jobType,
    checkPoint:'เริ่ม',
    fields
  });

  order['สถานะ']='เริ่มงานแล้ว';
  renderTimeline();
  alert('✅ บันทึกออกโรงงานแล้วครับ');
}

async function submitClient(){
  if(!validateHub('client')){alert('⚠️ เลขดุมล้อต้องไม่น้อยกว่าจุดก่อนหน้า');return;}
  const mileC=reqVal('mile-client','เลขไมล์ถึงลูกค้า');if(!mileC) return;
  const hubC=reqVal('hub-client','เลขดุมล้อถึงลูกค้า');if(!hubC) return;
  const r=await postGAS({action:'driverArrived',orderId:order['Order ID'],userId:U.userId});
  if(!r?.success){alert('❌ '+(r?.error||'เกิดข้อผิดพลาด'));return;}
  hubHistory.client=parseFloat(hubC);
  const fields={'เลขไมล์ลูกค้า':mileC,'เลขดุมล้อลูกค้า':hubC};
  const h=getVal('w-client-h'),l=getVal('w-client-l');
  if(h&&l){fields['น้ำหนักหนักลูกค้า']=h;fields['น้ำหนักเบาลูกค้า']=l;fields['สุทธิลูกค้า']=Math.abs(parseFloat(h)-parseFloat(l));if(photos['client']) fields['รูปลูกค้า']=photos['client'];}
  await postGAS({action:'submitWeight',orderId:order['Order ID'],userId:U.userId,jobType,checkPoint:'ลูกค้า',fields});
  order['สถานะ']='ถึงลูกค้า';renderTimeline();alert('✅ บันทึกถึงลูกค้าแล้วครับ');
}

async function submitRamp(){
  if(!validateHub('ramp')){alert('⚠️ เลขดุมล้อต้องไม่น้อยกว่าจุดก่อนหน้า');return;}
  const mileR=reqVal('mile-ramp','เลขไมล์ถึงลาน');if(!mileR) return;

  const rcH=reqVal('w-rc-h','น้ำหนักหนักลูกค้า');if(!rcH) return;
  const rcL=reqVal('w-rc-l','น้ำหนักเบาลูกค้า');if(!rcL) return;
  if(!photos['ramp-client']){alert('กรุณาแนบรูปใบชั่งลูกค้า');return;}
  const rrH=reqVal('w-rr-h','น้ำหนักหนักลาน');if(!rrH) return;
  const rrL=reqVal('w-rr-l','น้ำหนักเบาลาน');if(!rrL) return;
  if(!photos['ramp-ramp']){alert('กรุณาแนบรูปใบชั่งลาน');return;}
  hubHistory.ramp=parseFloat(hubR);
  const fields={'เลขไมล์ลาน':mileR,'เลขดุมล้อลาน':hubR,
    'น้ำหนักหนักลูกค้า':rcH,'น้ำหนักเบาลูกค้า':rcL,'สุทธิลูกค้า':Math.abs(parseFloat(rcH)-parseFloat(rcL)),
    'น้ำหนักหนักลาน':rrH,'น้ำหนักเบาลาน':rrL,'สุทธิลาน':Math.abs(parseFloat(rrH)-parseFloat(rrL)),
    'รูปลูกค้า':photos['ramp-client']||'','รูปลาน':photos['ramp-ramp']||''};
  await postGAS({action:'submitWeight',orderId:order['Order ID'],userId:U.userId,jobType,checkPoint:'ลาน',notifyOwner:true,fields});
  order['สถานะ']='ถึงลาน';renderTimeline();alert('✅ บันทึกถึงลานและแจ้งเจ้าของสวนแล้วครับ');
}

function prepareFactory(){
  if(!validateHub('factory')){alert('⚠️ เลขดุมล้อต้องไม่น้อยกว่าจุดก่อนหน้า');return;}
  const mileF=getVal('mile-factory');if(!mileF){alert('กรุณากรอกเลขไมล์ปลายทาง');return;}
  const hubF=getVal('hub-factory');if(!hubF){alert('กรุณากรอกเลขดุมล้อปลายทาง');return;}
  const fLiter=getVal('fuel-factory-liter');if(!fLiter){alert('กรุณากรอกจำนวนลิตรน้ำมันโรงงาน');return;}
  const fPrice=getVal('fuel-factory-price');if(!fPrice){alert('กรุณากรอกราคาน้ำมันโรงงาน');return;}
  collectedData={};
  collectedData.mileFactory=mileF;collectedData.hubFactory=hubF;
  if(hasRamp&&jobType==='ปาล์ม'){
    const fcH=getVal('w-fc-h'),fcL=getVal('w-fc-l');
    const frH=getVal('w-fr-h'),frL=getVal('w-fr-l');
    if(!fcH||!fcL){alert('กรุณากรอกน้ำหนักลูกค้า(โรงงาน)');return;}
    if(!photos['fact-client']){alert('กรุณาแนบรูปใบชั่งลูกค้า');return;}
    if(!frH||!frL){alert('กรุณากรอกน้ำหนักลาน(โรงงาน)');return;}
    if(!photos['fact-ramp']){alert('กรุณาแนบรูปใบชั่งลาน');return;}
    collectedData.weightFactClient={h:fcH,l:fcL,net:Math.abs(parseFloat(fcH)-parseFloat(fcL))};
    collectedData.weightFactRamp={h:frH,l:frL,net:Math.abs(parseFloat(frH)-parseFloat(frL))};
  }else{
    const ffH=getVal('w-ff-h'),ffL=getVal('w-ff-l');
    if(!ffH||!ffL){alert('กรุณากรอกน้ำหนักปลายทาง');return;}
    if(!photos['factory']){alert('กรุณาแนบรูปใบชั่ง');return;}
    collectedData.weightFactory={h:ffH,l:ffL,net:Math.abs(parseFloat(ffH)-parseFloat(ffL))};
  }
  collectedData.fuelFactory={liter:fLiter,price:fPrice,total:(parseFloat(fLiter)*parseFloat(fPrice)).toFixed(2)};
  if(document.getElementById('chip-fuel-road').classList.contains('on')){
    const rows=[];
    document.querySelectorAll('[id^="fl-liter-"]').forEach(el=>{
      const rowId=el.id.replace('fl-liter-','');
      const l=parseFloat(el.value)||0,p=parseFloat(document.getElementById(`fl-price-${rowId}`)?.value)||0;
      if(l>0) rows.push({liter:l,price:p,total:(l*p).toFixed(2),photo:photos[`fuel-road-${rowId}`]});
    });
    collectedData.fuelRoad=rows;
  }
  if(document.getElementById('chip-toll').classList.contains('on')) collectedData.toll=getVal('toll-amount');
  if(document.getElementById('chip-repair').classList.contains('on')) collectedData.repair={cost:getVal('repair-cost'),note:getVal('repair-note')};
  showDashboard();
}

// ✅ ข้อ 1+4: Dashboard แสดงเลขดุมล้อ + ตัวเลขน้ำหนักจริง
function showDashboard(){
  const d = collectedData;
  const rows = [];
 
  // ── ระยะทางจากดุมล้อ ──────────────────────────────────
  rows.push({ section: '🛣️ ระยะทาง (จากดุมล้อ)' });
 
  const hubStart   = hubHistory.start   || 0;
  const hubClient  = hubHistory.client  || 0;
  const hubRamp    = hubHistory.ramp    || 0;
  const hubFactory = parseFloat(d.hubFactory) || 0;
 
  if (hubStart)   rows.push({ k: 'ดุมล้อเริ่ม',       v: Number(hubStart).toLocaleString() });
  if (hubClient)  rows.push({ k: 'ดุมล้อถึงลูกค้า',   v: Number(hubClient).toLocaleString() });
  if (hubRamp)    rows.push({ k: 'ดุมล้อถึงลาน',      v: Number(hubRamp).toLocaleString() });
  if (hubFactory) rows.push({ k: 'ดุมล้อปลายทาง',    v: Number(hubFactory).toLocaleString() });
 
  // คำนวณระยะแต่ละช่วง
  if (hubStart && hubClient) {
    const dist = hubClient - hubStart;
    rows.push({ k: '📏 เริ่ม → ลูกค้า', v: `${dist.toLocaleString()} กม.`, highlight: true });
  }
  if (hubClient && hubRamp) {
    const dist = hubRamp - hubClient;
    rows.push({ k: '📏 ลูกค้า → ลาน', v: `${dist.toLocaleString()} กม.`, highlight: true });
  }
  if (hubRamp && hubFactory) {
    const dist = hubFactory - hubRamp;
    rows.push({ k: '📏 ลาน → ปลายทาง', v: `${dist.toLocaleString()} กม.`, highlight: true });
  } else if (!hubRamp && hubClient && hubFactory) {
    const dist = hubFactory - hubClient;
    rows.push({ k: '📏 ลูกค้า → ปลายทาง', v: `${dist.toLocaleString()} กม.`, highlight: true });
  }
  if (hubStart && hubFactory) {
    const total = hubFactory - hubStart;
    rows.push({ k: '📏 รวมทั้งสาย', v: `${total.toLocaleString()} กม.`, highlight: true });
  }
 
  // ── น้ำหนัก ───────────────────────────────────────────
  rows.push({ section: '⚖️ น้ำหนัก' });
  if (d.weightFactClient) {
    rows.push({ k: 'ลูกค้า — รถหนัก',  v: `${Number(d.weightFactClient.h).toLocaleString()} กก.` });
    rows.push({ k: 'ลูกค้า — รถเบา',   v: `${Number(d.weightFactClient.l).toLocaleString()} กก.` });
    rows.push({ k: 'สุทธิลูกค้า',      v: `${Math.round(d.weightFactClient.net).toLocaleString()} กก.`, highlight: true });
    rows.push({ k: 'ลาน — รถหนัก',     v: `${Number(d.weightFactRamp.h).toLocaleString()} กก.` });
    rows.push({ k: 'ลาน — รถเบา',      v: `${Number(d.weightFactRamp.l).toLocaleString()} กก.` });
    rows.push({ k: 'สุทธิลาน',         v: `${Math.round(d.weightFactRamp.net).toLocaleString()} กก.`, highlight: true });
  } else if (d.weightFactory) {
    rows.push({ k: 'รถหนัก',          v: `${Number(d.weightFactory.h).toLocaleString()} กก.` });
    rows.push({ k: 'รถเบา',           v: `${Number(d.weightFactory.l).toLocaleString()} กก.` });
    rows.push({ k: 'สุทธิปลายทาง',   v: `${Math.round(d.weightFactory.net).toLocaleString()} กก.`, highlight: true });
  }
 
  const billName = order['ชื่อในบิล'] || order['ชื่อสวน'] || '—';
  rows.push({ k: 'เจ้าของใบ', v: billName });
 
  // ── ค่าใช้จ่าย ─────────────────────────────────────────
  rows.push({ section: '💰 ค่าใช้จ่าย' });
  rows.push({ k: '⛽ น้ำมันโรงงาน', v: `${d.fuelFactory.liter} ลิตร × ${d.fuelFactory.price} = ${d.fuelFactory.total} บาท` });
  if (d.fuelRoad && d.fuelRoad.length > 0) {
    d.fuelRoad.forEach((row, i) => {
      rows.push({ k: `⛽ น้ำมันทาง บิล${i+1}`, v: `${row.liter} ลิตร × ${row.price} = ${row.total} บาท` });
    });
  }
  if (d.toll)   rows.push({ k: '🛣️ ค่าทางด่วน', v: `${Number(d.toll).toLocaleString()} บาท` });
  if (d.repair) rows.push({ k: '🔧 ค่าซ่อมนอก', v: `${Number(d.repair.cost).toLocaleString()} บาท${d.repair.note?' ('+d.repair.note+')':''}` });
 
  // ── render ─────────────────────────────────────────────
  const content = document.getElementById('dash-content');
  let html = '';
  let sectionOpen = false;
  rows.forEach(r => {
    if (r.section) {
      if (sectionOpen) html += '</div>';
      html += `<div class="dash-section"><div class="dash-section-title">${r.section}</div>`;
      sectionOpen = true;
    } else if (r.highlight) {
      html += `<div class="dash-row"><span class="dash-key">${r.k}</span><span class="dash-highlight">${r.v}</span></div>`;
    } else {
      html += `<div class="dash-row"><span class="dash-key">${r.k}</span><span class="dash-val">${r.v}</span></div>`;
    }
  });
  if (sectionOpen) html += '</div>';
  content.innerHTML = html;
 
  document.getElementById('dashboard').classList.add('show');
  document.getElementById('dashboard').scrollTop = 0;
}

function closeDashboard(){document.getElementById('dashboard').classList.remove('show');}

async function confirmSubmit(){
  closeDashboard();
  const d=collectedData;
  // ✅ ข้อ 5: ส่ง billName ไปด้วย
  const billName=order['ชื่อในบิล']||order['ชื่อสวน']||'';
  const fields={'เลขไมล์ปลายทาง':d.mileFactory,'เลขดุมล้อปลายทาง':d.hubFactory};
  if(d.weightFactClient){
    Object.assign(fields,{
      'น้ำหนักหนักปลายทาง':d.weightFactClient.h,'น้ำหนักเบาปลายทาง':d.weightFactClient.l,
      'สุทธิปลายทาง':d.weightFactClient.net,'รูปปลายทาง':photos['fact-client']||'',
      'น้ำหนักหนักลาน':d.weightFactRamp.h,'น้ำหนักเบาลาน':d.weightFactRamp.l,
      'สุทธิลาน':d.weightFactRamp.net,'รูปลาน':photos['fact-ramp']||''
    });
  }else if(d.weightFactory){
    Object.assign(fields,{
      'น้ำหนักหนักปลายทาง':d.weightFactory.h,'น้ำหนักเบาปลายทาง':d.weightFactory.l,
      'สุทธิปลายทาง':d.weightFactory.net,'รูปปลายทาง':photos['factory']||''
    });
  }
  if(d.fuelFactory){fields['ลิตรน้ำมัน(ทาง)']=d.fuelFactory.liter;fields['ราคาน้ำมัน(ทาง)']=d.fuelFactory.price;}
  if(d.toll) fields['ค่าทางด่วน']=d.toll;
  if(d.repair){fields['ค่าซ่อมนอก']=d.repair.cost;fields['หมายเหตุค่าใช้จ่าย']=d.repair.note;if(photos['repair']) fields['รูปค่าซ่อมนอก']=photos['repair'];}
  if(d.fuelRoad&&d.fuelRoad.length>0&&photos['fuel-road-1']) fields['รูปน้ำมัน(ทาง)']=photos['fuel-road-1'];

  await postGAS({action:'submitWeight',orderId:order['Order ID'],userId:U.userId,jobType,checkPoint:'ปลายทาง',notifyOwner:true,billName,fields});
  const r=await postGAS({action:'driverComplete',orderId:order['Order ID'],userId:U.userId});
  if(!r?.success){alert('❌ '+(r?.error||'เกิดข้อผิดพลาด'));return;}
  document.getElementById('success-msg').innerHTML=`📋 ${order['Order ID']}<br>ส่งข้อมูลให้ Admin และเจ้าของสวนแล้วครับ`;
  document.getElementById('success').classList.add('show');
}

async function requestCancel(){
  const reason=prompt('กรุณาระบุสาเหตุที่ขอยกเลิก:');
  if(reason===null) return;
  const r=await postGAS({action:'driverCancelRequest',orderId:order['Order ID'],userId:U.userId,reason});
  if(r?.success) alert('📤 ส่งคำขอไปยัง Admin แล้วครับ');
  else alert('❌ '+(r?.error||'เกิดข้อผิดพลาด'));
}

init();
</script>
